<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adicionar Despesa</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
  <ul>
    <li><a href="{{ url_for('dashboard') }}">Início</a></li>
    <li><a href="{{ url_for('adicionar_receita') }}">Receita</a></li>
    <li><a href="{{ url_for('adicionar_despesa') }}" class="active">Despesa</a></li>
    <li><a href="{{ url_for('historico') }}">Histórico</a></li>
    <li><a href="{{ url_for('agendar_transacao') }}">Agendar</a></li>
    <li><a href="{{ url_for('logout') }}">Sair</a></li>
  </ul>
</nav>

<main>
  <div class="card-box">
    <h3>Adicionar Despesa</h3>

    <form method="POST" action="{{ url_for('adicionar_despesa') }}">
      <label>Descrição</label>
      <input type="text" name="descricao" required>

      <label>Valor (R$)</label>
      <input type="number" name="valor" step="0.01" required>

      <label>Data</label>
      <input type="date" name="data" required>

      <label>Categoria</label>
      <select name="categoria" required>
        <option value="" disabled selected>Selecione</option>
        <option>Alimentação</option>
        <option>Transporte</option>
        <option>Moradia</option>
        <option>Saúde</option>
        <option>Outros</option>
      </select>

      <button type="submit">Adicionar Despesa</button>
    </form>
  </div>

 

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adicionar Despesa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <nav class="dashboard-menu">
    <a href="{{ url_for('dashboard') }}" class="menu-btn active">Dashboard</a>
    <a href="{{ url_for('adicionar_receita') }}" class="menu-btn">Receita</a>
    <a href="{{ url_for('adicionar_despesa') }}" class="menu-btn">Despesa</a>
    <a href="{{ url_for('historico') }}" class="menu-btn">Histórico</a>
    <a href="{{ url_for('agendar_transacao') }}" class="menu-btn">Agendar</a>
    <a href="{{ url_for('logout') }}" class="menu-btn">Sair</a>
  </nav>


  <div class="container">
    <h3 class="mb-4">Adicionar Despesa</h3>
    <form method="POST" action="{{ url_for('adicionar_despesa') }}">
      <div class="row mb-3">
        <div class="col-md-6 mb-3 mb-md-0">
          <label for="descricao" class="form-label">Descrição</label>
          <input type="text" class="form-control" id="descricao" name="descricao" placeholder="Ex: Conta de luz" required />
        </div>
        <div class="col-md-6">
          <label for="valor" class="form-label">Valor (R$)</label>
          <input type="number" class="form-control" id="valor" name="valor" step="0.01" min="0" placeholder="0.00" required />
        </div>
      </div>

      <div class="row mb-4">
        <div class="col-md-6 mb-3 mb-md-0">
          <label for="data" class="form-label">Data</label>
          <input type="date" class="form-control" id="data" name="data" required />
        </div>
        <div class="col-md-6">
          <label for="categoria" class="form-label">Categoria</label>
          <select id="categoria" name="categoria" class="form-select" required>
            <option value="" disabled selected>Selecione</option>
            <option value="Alimentação">Alimentação</option>
            <option value="Transporte">Transporte</option>
            <option value="Moradia">Moradia</option>
            <option value="Saúde">Saúde</option>
            <option value="Outros">Outros</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn btn-success">Adicionar Despesa</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

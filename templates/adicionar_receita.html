<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Adicionar Receita</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
  <ul>
    <li><a href="{{ url_for('dashboard') }}">Início</a></li>
    <li><a href="{{ url_for('adicionar_receita') }}" class="active">Receita</a></li>
    <li><a href="{{ url_for('adicionar_despesa') }}">Despesa</a></li>
    <li><a href="{{ url_for('historico') }}">Histórico</a></li>
    <li><a href="{{ url_for('agendar_transacao') }}">Agendar</a></li>
    <li><a href="{{ url_for('logout') }}">Sair</a></li>
  </ul>
</nav>

<main>

  <div class="card-box">
    <h3>Adicionar Receita</h3>

    <form method="POST" action="{{ url_for('adicionar_receita') }}">
      <label>Descrição</label>
      <input type="text" name="descricao" required>

      <label>Valor (R$)</label>
      <input type="number" name="valor" step="0.01" required>

      <label>Data</label>
      <input type="date" name="data" required>

      <label>Categoria</label>
      <select name="categoria" required>
        <option value="Salário">Salário</option>
        <option value="Freelance">Freelance</option>
        <option value="Investimentos">Investimentos</option>
        <option value="Outros">Outros</option>
      </select>
      <button type="submit">Adicionar Receita</button>
    </form>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendar Transação</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- CSS personalizado -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

  <!-- Menu de navegação -->
  <nav class="dashboard-menu">
    <a href="{{ url_for('dashboard') }}" class="menu-btn active">Dashboard</a>
    <a href="{{ url_for('adicionar_receita') }}" class="menu-btn">Receita</a>
    <a href="{{ url_for('adicionar_despesa') }}" class="menu-btn">Despesa</a>
    <a href="{{ url_for('historico') }}" class="menu-btn">Histórico</a>
    <a href="{{ url_for('agendar_transacao') }}" class="menu-btn">Agendar</a>
    <a href="{{ url_for('logout') }}" class="menu-btn">Sair</a>
  </nav>

  <!-- Container do formulário -->
  <div class="agendar-container container p-4 shadow rounded bg-white">
    <h3 class="mb-4 text-center">📅 Agendar Transação Recorrente</h3>

    <form method="POST" action="{{ url_for('agendar_transacao') }}">
      <div class="mb-3">
        <label for="tipo" class="form-label">Tipo</label>
        <select class="form-select" id="tipo" name="tipo" required>
          <option value="receita">Receita</option>
          <option value="despesa">Despesa</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="descricao" class="form-label">Descrição</label>
        <input type="text" class="form-control" id="descricao" name="descricao" required>
      </div>

      <div class="mb-3">
        <label for="valor" class="form-label">Valor (R$)</label>
        <input type="number" step="0.01" class="form-control" id="valor" name="valor" required>
      </div>

      <div class="mb-3">
        <label for="categoria" class="form-label">Categoria</label>
        <input type="text" class="form-control" id="categoria" name="categoria" required>
      </div>

      <div class="mb-3">
        <label for="data_inicio" class="form-label">Data de Início</label>
        <input type="date" class="form-control" id="data_inicio" name="data_inicio" required>
      </div>

      <div class="mb-3">
        <label for="frequencia" class="form-label">Frequência</label>
        <select class="form-select" id="frequencia" name="frequencia" required>
          <option value="diaria">Diária</option>
          <option value="semanal">Semanal</option>
          <option value="mensal">Mensal</option>
        </select>
      </div>

      <div class="mb-4">
        <label for="repeticoes" class="form-label">Número de Repetições</label>
        <input type="number" class="form-control" id="repeticoes" name="repeticoes" min="1" required>
      </div>

      <button type="submit" class="btn btn-primary w-100">Agendar</button>
    </form>
  </div>

</body>
</html>

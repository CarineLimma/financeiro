<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Controle Financeiro</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS personalizado -->
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>
  <div id="dashboard" class="container mt-4">
    <h2 class="mb-4 text-center">Seu Painel de Controle Financeiro</h2> 

    <!-- Navbar -->
    <div class="dashboard-menu">
      <a href="{{ url_for('dashboard') }}" class="menu-btn active">Dashboard</a>
      <a href="{{ url_for('adicionar_receita') }}" class="menu-btn">Receita</a>
      <a href="{{ url_for('adicionar_despesa') }}" class="menu-btn">Despesa</a>
      <a href="{{ url_for('historico') }}" class="menu-btn">Histórico</a>
      <a href="{{ url_for('login') }}" class="menu-btn">Login</a>
    </div>

    <!-- Cards dos gráficos -->
    <div class="cards-container">
      
      <!-- Card Receita -->
      <div class="card">
        <div class="card-header">
          <h3>Receita</h3>
          <span class="saldo">R$ 3500</span>
        </div>
        <canvas id="receita-chart"></canvas>
      </div>

      <!-- Card Despesa -->
      <div class="card">
        <div class="card-header">
          <h3>Despesa</h3>
          <span class="saldo">R$ 2000</span>
        </div>
        <canvas id="despesa-chart"></canvas>
      </div>

    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- JS personalizado -->
  <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Controle Financeiro</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS personalizado -->
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>
  <div id="dashboard" class="container mt-4">
    <h2 class="mb-4 text-center">Painel de Controle Financeiro</h2> 

    <!-- Navbar -->
    <div class="dashboard-menu">

      <a href="{{ url_for('dashboard') }}" class="menu-btn active">Dashboard</a>
      <a href="{{ url_for('adicionar_receita') }}" class="menu-btn">Receita</a>
      <a href="{{ url_for('adicionar_despesa') }}" class="menu-btn">Despesa</a>
      <a href="{{ url_for('historico') }}" class="menu-btn">Histórico</a>
      <a href="{{ url_for('login') }}" class="menu-btn">Login</a>
      <a href="{{ url_for('agendar_transacao') }}" class="menu-btn">Agendar</a>
    </div>

    <!-- Cards dos gráficos -->
    <div class="row g-4 mt-2">
      <!-- Card Receita -->
      <div class="col-12 col-md-6">
        <div class="card">
          <div class="card-header">
            📈 Receita
          </div>
          <div class="card-body" style="position: relative; height: 300px;">
            <canvas id="receitaChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Card Despesa -->
      <div class="col-12 col-md-6">
        <div class="card">
          <div class="card-header">
            📉 Despesa
          </div>
          <div class="card-body" style="position: relative; height: 300px;">
            <canvas id="despesaChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- JS personalizado -->
  <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>

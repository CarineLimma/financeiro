<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard Financeiro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav class="menu-top">
    <a href="/receita" class="btn-menu">Receita</a>
    <a href="/despesa" class="btn-menu">Despesa</a>
    <a href="/historico" class="btn-menu">Histórico</a>
    <a href="/login" class="btn-menu">Login</a>
  </nav>

  <div class="content-wrapper">
    <h3>Dashboard Financeiro</h3>

    <div class="card-graph">
      <canvas id="graficoReceitas" height="300"></canvas>
    </div>

    <div class="card-graph">
      <canvas id="graficoDespesas" height="300"></canvas>
    </div>
  </div>

  <script>
    // Gráfico de Receitas - barras
    const ctxReceitas = document.getElementById('graficoReceitas').getContext('2d');
    const graficoReceitas = new Chart(ctxReceitas, {
      type: 'bar',
      data: {
        labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'],
        datasets: [{
          label: 'Receitas (R$)',
          data: [5000, 7000, 6500, 7200, 8000, 8500],
          backgroundColor: '#4A90E2',
          borderRadius: 8,
          barPercentage: 0.6,
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: true, position: 'top' },
          tooltip: { enabled: true }
        },
        scales: {
          y: {
            beginAtZero: true,
            grid: { color: '#E1E8F0' },
            ticks: { color: '#34495E' }
          },
          x: {
            grid: { display: false },
            ticks: { color: '#34495E' }
          }
        }
      }
    });

    // Gráfico de Despesas - linha
    const ctxDespesas = document.getElementById('graficoDespesas').getContext('2d');
    const graficoDespesas = new Chart(ctxDespesas, {
      type: 'line',
      data: {
        labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'],
        datasets: [{
          label: 'Despesas (R$)',
          data: [3000, 2800, 3200, 3500, 3700, 3600],
          borderColor: '#E74C3C',
          backgroundColor: 'rgba(231, 76, 60, 0.2)',
          fill: true,
          tension: 0.3,
          pointRadius: 5,
          pointHoverRadius: 7,
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: true, position: 'top' },
          tooltip: { enabled: true }
        },
        scales: {
          y: {
            beginAtZero: true,
            grid: { color: '#E1E8F0' },
            ticks: { color: '#34495E' }
          },
          x: {
            grid: { display: false },
            ticks: { color: '#34495E' }
          }
        }
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Controle Financeiro</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS personalizado -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container mt-5">
    <h2 class="mb-4 text-center">Seu Painel de Controle Financeiro</h2> 

    <div class="row g-4 justify-content-center">
      <div class="col-12 col-md-3">
        <a href="{{ url_for('adicionar_despesa') }}" class="btn btn-danger w-100 p-4">Despesa</a>
      </div>
      <div class="col-12 col-md-3">
        <a href="{{ url_for('adicionar_receita') }}" class="btn btn-success w-100 p-4">Receita</a>
      </div>
      <div class="col-12 col-md-3">
        <a href="{{ url_for('historico') }}" class="btn btn-primary w-100 p-4">Histórico</a>
      </div>
      <div class="col-12 col-md-3">
        <a href="{{ url_for('agendar_transacao') }}" class="btn btn-warning w-100 p-4">Agendar Transações</a>
      </div>
      <div class="col-12 col-md-3">
        <a href="{{ url_for('logout') }}" class="btn btn-dark w-100 p-4">Sair</a>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redefinir Senha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title mb-4 text-center">Redefinir Senha</h4>

                        {% with messages = get_flashed_messages() %}
                          {% if messages %}
                            <div class="alert alert-info">
                              {{ messages[0] }}
                            </div>
                          {% endif %}
                        {% endwith %}

                        <form method="POST">
                            <div class="mb-3">
                                <label for="senha" class="form-label">Nova Senha</label>
                                <input type="password" class="form-control" id="senha" name="senha" placeholder="Digite a nova senha" required />
                            </div>

                            <div class="mb-3">
                                <label for="senha_confirm" class="form-label">Confirme a Nova Senha</label>
                                <input type="password" class="form-control" id="senha_confirm" name="senha_confirm" placeholder="Confirme a nova senha" required />
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Redefinir Senha</button>
                        </form>
                        
                        <div class="mt-3 text-center">
                            <a href="{{ url_for('login') }}">Voltar para Login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
